id: TC-LOGIN-BAD-PASSWORD
title: Login with wrong password should show error and no session
summary: Sai mật khẩu thì không vào được admin; hiện lỗi chung, vẫn ở màn đăng nhập.
story: |
  Given đã có tài khoản operator
  When nhập đúng email nhưng sai mật khẩu
  Then thấy thông báo lỗi (không lộ chi tiết) và không có phiên đăng nhập
refs:
  capability: CAP-admin
  component: CMP-01
  rule: RUL-01-login-reject-bad-password
  scenario: SC-LOGIN
  example: EX-LOGIN-02
  screen: W-AD-AUTH-001
  target: CTR-admin-web
  api: API-AD-AUTH-001
coverage: [exception]
priority: high
automation: automated
tags: [regression, e2e, ui, security]
dimensions:
  business: [workflow]
  technical: [ui, validation]
  quality: [security]
preconditions:
  - Đã có tài khoản operator
testData:
  email: admin@example.com
  password: wrong-password
steps:
  - as: Mở trang đăng nhập
    action: goto
    path: /login
  - as: Nhập email
    action: fill
    testId: auth-login-email-input
    value: "{{email}}"
  - as: Nhập mật khẩu sai
    action: fill
    testId: auth-login-password-input
    value: "{{password}}"
  - as: Bấm Đăng nhập
    action: click
    testId: auth-login-submit-btn
expected: Hiện lỗi không liệt kê tài khoản; vẫn ở login; không có session
postcondition:
  - Không thấy shell đã xác thực

feature: ad-auth-login
genType: e2e
route:
  path: /login
  auth: guest
testIds:
  required:
    - auth-login-email-input
    - auth-login-password-input
    - auth-login-submit-btn
    - auth-login-alert
